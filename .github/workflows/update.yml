name: Update Showtimes

on:
  schedule:
    # Hourly at :15. GitHub may delay by several minutes during peak load.
    - cron: '15 * * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'scraper/**'
      - 'site/**'
      - '.github/workflows/update.yml'

# Prevent overlapping runs
concurrency:
  group: update-showtimes
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: python scraper/main.py --output-dir site/data --log-level INFO

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/showtimes.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
          else
            git commit -m "chore: update showtimes ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
